name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build GetBored iOS
        run: |
          xcodebuild \
            -workspace GetBoredIOS.xcworkspace \
            -scheme "GetBored iOS" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
