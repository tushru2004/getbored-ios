name: Swift package tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: swift-test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: IOSContractTests
        run: swift test --filter IOSContractTests
